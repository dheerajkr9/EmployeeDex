<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff — EmployeeDex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        royal:  { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9',800:'#5b21b6',900:'#4c1d95',950:'#2e1065' },
                        gold:   { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f' },
                        navy:   { 700:'#1e2749',800:'#1e1b4b',900:'#0f0a2e',950:'#070419' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="min-h-screen bg-navy-950" style="font-family:'Inter',sans-serif;">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-navy-900/80 backdrop-blur-xl border-b border-royal-800/30 shadow-lg shadow-navy-950/50">
        <div class="max-w-[1500px] mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
            <a href="{{ url_for('index') }}" class="flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-royal-600 to-royal-800 flex items-center justify-center shadow-md ring-1 ring-gold-500/20">
                    <i class="fas fa-crown text-gold-400 text-sm"></i>
                </div>
                <span class="text-xl font-bold text-white" style="font-family:'Playfair Display',serif;">
                    Employee<span class="text-gold-400">Dex</span>
                </span>
            </a>
            <div class="flex items-center gap-2.5">
                <a href="{{ url_for('index') }}" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-royal-900/60 text-royal-300 border border-royal-800/40 hover:border-royal-600/50 hover:text-white transition-all">
                    <i class="fas fa-house mr-1"></i>Home
                </a>
                <a href="{{ url_for('dashboard') }}" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-royal-900/60 text-royal-300 border border-royal-800/40 hover:border-royal-600/50 hover:text-white transition-all">
                    <i class="fas fa-arrow-left mr-1"></i>Dashboard
                </a>
                <a href="{{ url_for('logout') }}" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-royal-900/60 text-royal-300 border border-royal-800/40 hover:bg-red-900/40 hover:text-red-300 transition-all">
                    <i class="fas fa-sign-out-alt mr-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="fixed top-20 right-4 z-50 flex flex-col gap-3 max-w-sm" id="flashContainer">
        {% for category, message in messages %}
        <div class="flash-msg px-4 py-3 rounded-lg shadow-xl text-sm font-medium border-l-4
            {% if category == 'success' %}bg-emerald-900/80 text-emerald-200 border-emerald-400
            {% elif category == 'danger' %}bg-red-900/80 text-red-200 border-red-400
            {% else %}bg-blue-900/80 text-blue-200 border-blue-400{% endif %}
            backdrop-blur-sm flex justify-between items-center">
            <span>{{ message }}</span>
            <button onclick="this.parentElement.remove()" class="ml-3 opacity-60 hover:opacity-100 text-lg">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <div class="bg-navy-900/50 backdrop-blur border border-royal-800/30 rounded-2xl shadow-2xl shadow-navy-950/50 overflow-hidden">
            <!-- Header -->
            <div class="px-6 sm:px-8 py-5 border-b border-royal-800/30 bg-navy-900/40">
                <h2 class="text-xl font-bold text-white flex items-center gap-2.5" style="font-family:'Playfair Display',serif;">
                    <i class="fas fa-user-plus text-gold-500"></i>
                    Add New Staff Member
                </h2>
                <p class="text-sm text-royal-400/50 mt-1">Fill in all required fields to create a new record.</p>
            </div>

            <!-- Form -->
            <form method="POST" action="{{ url_for('add_employee') }}" id="employeeForm" class="px-6 sm:px-8 py-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <!-- Employee ID -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Employee ID <span class="text-red-400">*</span></label>
                        <input type="text" name="employee_id" value="{{ next_id }}" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Name -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Full Name <span class="text-red-400">*</span></label>
                        <input type="text" name="name" placeholder="Enter full name" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white placeholder-royal-500/40 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Gender -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Gender <span class="text-red-400">*</span></label>
                        <select name="gender" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-royal-300 text-sm focus:outline-none focus:border-gold-500/50 transition-all cursor-pointer">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <!-- DOB -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Date of Birth <span class="text-red-400">*</span></label>
                        <input type="date" name="date_of_birth" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-royal-300 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Phone -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Phone <span class="text-red-400">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="10-digit phone" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white placeholder-royal-500/40 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Email -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Email <span class="text-red-400">*</span></label>
                        <input type="email" name="email" placeholder="staff@college.edu.in" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white placeholder-royal-500/40 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Department -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Department <span class="text-red-400">*</span></label>
                        <select name="department" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-royal-300 text-sm focus:outline-none focus:border-gold-500/50 transition-all cursor-pointer">
                            <option value="">Select Department</option>
                            <option>Computer Science</option>
                            <option>Mathematics</option>
                            <option>Physics</option>
                            <option>Chemistry</option>
                            <option>English</option>
                            <option>Economics</option>
                            <option>Mechanical Engineering</option>
                            <option>Electrical Engineering</option>
                            <option>Civil Engineering</option>
                            <option>Biotechnology</option>
                            <option>Commerce</option>
                            <option>Management Studies</option>
                            <option>Library Science</option>
                            <option>Physical Education</option>
                            <option>Administration</option>
                        </select>
                    </div>
                    <!-- Designation -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Designation <span class="text-red-400">*</span></label>
                        <input type="text" name="designation" placeholder="e.g. Assistant Professor" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white placeholder-royal-500/40 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Salary -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Salary ₹ <span class="text-red-400">*</span></label>
                        <input type="number" id="salary" name="salary" placeholder="Monthly salary" min="0" step="500" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white placeholder-royal-500/40 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Joining Date -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Joining Date <span class="text-red-400">*</span></label>
                        <input type="date" name="joining_date" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-royal-300 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all">
                    </div>
                    <!-- Status -->
                    <div>
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Status <span class="text-red-400">*</span></label>
                        <select name="status" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-royal-300 text-sm focus:outline-none focus:border-gold-500/50 transition-all cursor-pointer">
                            <option value="Active" selected>Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <!-- Address (full width) -->
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-royal-300 uppercase tracking-wider mb-1.5">Address <span class="text-red-400">*</span></label>
                        <textarea name="address" rows="3" placeholder="Full address" required
                            class="w-full px-4 py-2.5 rounded-lg bg-navy-950/60 border border-royal-800/40 text-white placeholder-royal-500/40 text-sm focus:outline-none focus:border-gold-500/50 focus:ring-2 focus:ring-gold-500/15 transition-all resize-y"></textarea>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3 mt-7 pt-6 border-t border-royal-800/30">
                    <button type="submit"
                        class="px-6 py-2.5 rounded-lg bg-gradient-to-r from-gold-600 to-gold-700 hover:from-gold-500 hover:to-gold-600 text-navy-950 text-sm font-bold shadow-lg shadow-gold-900/30 transition-all flex items-center gap-2">
                        <i class="fas fa-save"></i>Save Record
                    </button>
                    <a href="{{ url_for('dashboard') }}"
                        class="px-6 py-2.5 rounded-lg bg-navy-900/60 text-royal-300 text-sm font-medium border border-royal-800/40 hover:border-royal-600/50 hover:text-white transition-all">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
